name: CI

on:
  push:
    branches: [main]
    # Release tags additionally run the publish jobs below (crates.io + PyPI),
    # gated on the full check matrix passing first. Publishing happens ONLY on
    # `v*` tags — pushes to main and PRs never publish.
    tags: ["v*"]
  pull_request:

# A newer push to the same branch/PR cancels in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # The bootstrap tests' `rust-script` subprocess re-resolves deps against the
  # sparse crates.io index; HTTP/2 multiplexing intermittently dies on CI
  # runners with "[16] Error in the HTTP2 framing layer". Force HTTP/1.1 and
  # allow more network retries to make these registry fetches reliable.
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "5"

jobs:
  # Every check runs a single bin/ script inside the flake devShell
  # (`nix develop ./nix`), so the exact same command reproduces locally and the
  # flake is the single source of truth for tooling — rustup (→ rust 1.96.0 with
  # clippy + rustfmt from rust-toolchain.toml), rust-script, python3, maturin,
  # tree-sitter, nodejs. No per-job setup-rust-toolchain / setup-python /
  # `cargo install rust-script` steps to drift out of sync with the dev env.
  check:
    name: ${{ matrix.name }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Let the other checks finish even if one fails.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Test
            run: bin/ctest
          - os: ubuntu-latest
            name: Lint (fmt + clippy)
            # Formatting needs no build, so check it first for fast feedback.
            run: |
              bin/fmt-check
              bin/lint -- -D warnings
          - os: ubuntu-latest
            name: Bootstrap (self-host no-op)
            run: bin/check-bootstrap
          # Exercise the bundled examples: `quilt check` every examples/**/*.quilt,
          # then expand each one with a committed output and diff against it.
          - os: ubuntu-latest
            name: Examples (check + expand diff)
            run: bin/check-examples
          # Build the quilt_python PyO3 module (maturin), then pytest its bindings
          # and run the self-contained .py.quilt examples. maturin + pytest are
          # provided by the flake devShell.
          - os: ubuntu-latest
            name: Python (quilt_python bindings + .py.quilt runtime)
            run: |
              bin/build-py
              bin/test-py
          # macOS is the primary development platform, so run the
          # platform-sensitive checks there too (paths, dyld libpython loading,
          # tree-sitter codegen). The Linux matrix above stays the canonical
          # gate; Lint/Bootstrap are platform-independent and need not repeat.
          # Windows is intentionally omitted — the Nix devShell every check runs
          # in isn't supported there.
          - os: macos-latest
            name: Test
            run: bin/ctest
          - os: macos-latest
            name: Examples (check + expand diff)
            run: bin/check-examples
          - os: macos-latest
            name: Python (quilt_python bindings + .py.quilt runtime)
            run: |
              bin/build-py
              bin/test-py
    # Run every `run:` step inside the devShell: GitHub writes the step's script
    # to a temp file and substitutes it for `{0}`, so multi-line steps work too.
    defaults:
      run:
        shell: nix develop ./nix --command bash -euo pipefail {0}
    steps:
      - uses: actions/checkout@v4
      # Install Nix with flakes + the `nix-command` enabled (needed for
      # `nix develop`).
      - uses: DeterminateSystems/nix-installer-action@v22
      # Free, zero-config binary cache backed by the GitHub Actions cache —
      # caches the devShell's /nix/store closure between runs. No secret needed.
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      # rustup downloads the toolchain (rust-toolchain.toml → 1.96.0) on first
      # use into ~/.rustup, and crates/build artifacts land in ~/.cargo and
      # target/ — none of which live in the Nix store, so cache them directly.
      # (Swatinem/rust-cache runs on the host PATH where the Nix-provided rustc
      # isn't visible, so it can't be used here; actions/cache works fine.)
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: ${{ matrix.run }}

  # ---------------------------------------------------------------------------
  # Publish jobs (issue #33). These run ONLY when a `v*` tag is pushed to
  # QuiltLang/quilt, and only after the full check matrix passes on that tag.
  # ---------------------------------------------------------------------------

  # crates.io: publish in dependency order. Uses a classic API token
  # (`CARGO_REGISTRY_TOKEN` repo secret) because crates.io Trusted Publishing
  # can only be configured on a crate that already exists — switch to OIDC via
  # rust-lang/crates-io-auth-action after the first publish.
  #
  # ⚠️ Currently only `tree-sitter-quilt` can publish successfully:
  # `quiltlang` and `quilt-lsp` depend on the QuiltLang/tree-sitter-* grammar
  # forks as *git* dependencies, which crates.io rejects. Those must become
  # registry dependencies (publish the forks or reconcile with upstream
  # releases — see #32) before their `cargo publish` lines can be uncommented.
  publish-crates:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'QuiltLang/quilt'
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: nix develop ./nix --command bash -euo pipefail {0}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: cargo publish (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # `cargo publish` waits for the crate to be live in the index before
        # returning, so each line can depend on the previous one.
        #
        # Idempotent across re-tags: if a version was already published by an
        # earlier tag run (e.g. a re-tag to fix the wheel/binary matrix),
        # crates.io rejects the re-upload — treat that one case as success but
        # still fail on any other error.
        run: |
          if ! out=$(cargo publish -p tree-sitter-quilt 2>&1); then
            echo "$out"
            echo "$out" | grep -qiE "already (uploaded|exists)" \
              || { echo "::error::cargo publish failed"; exit 1; }
            echo "::notice::tree-sitter-quilt already on crates.io for this version — skipping"
          else
            echo "$out"
          fi
          # Blocked on git deps (see header comment / issue #32):
          # cargo publish -p quiltlang
          # cargo publish -p quilt-lsp

  # PyPI: build the `quilt-python` distribution (abi3 wheels, one per platform,
  # each working for any CPython >= 3.8, plus an sdist) with maturin. The
  # Python import name stays `quilt` (pyproject.toml module-name).
  #
  # No x86_64-apple-darwin (Intel mac) wheel: it needs a `macos-13` runner, and
  # GitHub's Intel macOS runners are being retired and now queue indefinitely
  # (jobs sat ~10h unscheduled during the v0.1.0-alpha release). Apple-silicon
  # macOS + x86_64/aarch64 Linux cover the alpha; Intel-mac users install from
  # the sdist (builds locally). Revisit by cross-compiling x86_64 on the arm64
  # macOS runner once it can be validated.
  pypi-wheels:
    name: PyPI wheel (${{ matrix.platform.target }} ${{ matrix.platform.runner }})
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'QuiltLang/quilt'
    needs: check
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64 }
          # Free arm64 Linux runners require the repo to be public.
          - { runner: ubuntu-24.04-arm, target: aarch64 }
          - { runner: macos-latest, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      # quilt_python depends on quilt with default-features = false (no
      # tree-sitter, no git grammar deps), so this is a plain Rust build —
      # maturin-action provides its own Rust toolchain + manylinux containers
      # and doesn't need the Nix devShell.
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: auto
          args: --release --out dist --manifest-path quilt-python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-wheel-${{ matrix.platform.target }}-${{ matrix.platform.runner }}
          path: dist

  pypi-sdist:
    name: PyPI sdist
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'QuiltLang/quilt'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # maturin bundles the local path-dependency crates (quiltlang) into the
      # sdist, so it builds standalone.
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path quilt-python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-sdist
          path: dist

  # Upload via PyPI Trusted Publishing (OIDC): the publisher on PyPI must point
  # at QuiltLang/quilt + workflow `ci.yml` and the project name `quilt-python`
  # (the distribution name in quilt-python/pyproject.toml). No API token /
  # secret is needed; `id-token: write` is what authenticates us.
  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'QuiltLang/quilt'
    needs: [pypi-wheels, pypi-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pypi-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
