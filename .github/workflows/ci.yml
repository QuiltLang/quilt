name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR cancels in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Each job runs a single bin/ script so the exact same check reproduces
  # locally: `bin/ctest`, `bin/lint`, `bin/check-bootstrap`.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Honors rust-toolchain.toml (channel 1.96.0) and bundles cargo caching.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      # No Python needed: quilt-python is not in the workspace default-members,
      # so `cargo test` builds the CLI + LSP without linking libpython.
      # The reduce/run tests in quilt/tests/bootstrap.rs shell out to
      # `rust-script` (the `↓` operator runs expanded code), so it must be on
      # PATH for the test job too — not only the bootstrap job.
      - name: Install rust-script
        run: cargo install rust-script --locked
      - name: Run tests
        run: bin/ctest

  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      # Formatting needs no build, so check it first for fast feedback.
      - name: Format check
        run: bin/fmt-check
      # No Python needed (quilt-python is out of default-members; see the test job).
      - name: Clippy (warnings are errors)
        run: bin/lint -- -D warnings

  bootstrap:
    name: Bootstrap (self-host no-op)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      # The two bootstrap stages expand and run mk_meta.rs.quilt via rust-script.
      - name: Install rust-script
        run: cargo install rust-script --locked
      - name: Verify bootstrap regenerates meta.rs unchanged
        run: bin/check-bootstrap
