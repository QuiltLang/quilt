name: CI

on:
  push:
    branches: [main]
    # Release tags additionally run the publish jobs below (crates.io + PyPI),
    # gated on the full check matrix passing first. Publishing happens ONLY on
    # `v*` tags — pushes to main and PRs never publish.
    tags: ["v*"]
  pull_request:

# A newer push to the same branch/PR cancels in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # The bootstrap tests' `rust-script` subprocess re-resolves deps against the
  # sparse crates.io index; HTTP/2 multiplexing intermittently dies on CI
  # runners with "[16] Error in the HTTP2 framing layer". Force HTTP/1.1 and
  # allow more network retries to make these registry fetches reliable.
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "5"

jobs:
  # Every check runs a single bin/ script inside the flake devShell
  # (`nix develop ./nix`), so the exact same command reproduces locally and the
  # flake is the single source of truth for tooling — rustup (→ rust 1.96.0 with
  # clippy + rustfmt from rust-toolchain.toml), rust-script, python3, maturin,
  # tree-sitter, nodejs. No per-job setup-rust-toolchain / setup-python /
  # `cargo install rust-script` steps to drift out of sync with the dev env.
  check:
    name: ${{ matrix.name }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Let the other checks finish even if one fails.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Test
            run: bin/ctest
          - os: ubuntu-latest
            name: Lint (fmt + clippy)
            # Formatting needs no build, so check it first for fast feedback.
            run: |
              bin/fmt-check
              bin/lint -- -D warnings
          - os: ubuntu-latest
            name: Bootstrap (self-host no-op)
            run: bin/check-bootstrap
          # Verify the vendored tree-sitter parsers (quilt/grammars/) still match
          # the pinned forks — i.e. nobody hand-edited a parser or forgot to run
          # bin/sync-grammars after a rev bump. Clones the forks, so needs network.
          - os: ubuntu-latest
            name: Grammars (vendored parsers in sync with forks)
            run: bin/check-grammars
          # Exercise the bundled examples: `quilt check` every examples/**/*.quilt,
          # then expand each one with a committed output and diff against it.
          - os: ubuntu-latest
            name: Examples (check + expand diff)
            run: bin/check-examples
          # Build the quilt_python PyO3 module (maturin), then pytest its bindings
          # and run the self-contained .py.quilt examples. maturin + pytest are
          # provided by the flake devShell.
          - os: ubuntu-latest
            name: Python (quilt_python bindings + .py.quilt runtime)
            run: |
              bin/build-py
              bin/test-py
          # macOS is the primary development platform, so run the
          # platform-sensitive checks there too (paths, dyld libpython loading,
          # tree-sitter codegen). The Linux matrix above stays the canonical
          # gate; Lint/Bootstrap are platform-independent and need not repeat.
          # Windows is intentionally omitted — the Nix devShell every check runs
          # in isn't supported there.
          - os: macos-latest
            name: Test
            run: bin/ctest
          - os: macos-latest
            name: Examples (check + expand diff)
            run: bin/check-examples
          - os: macos-latest
            name: Python (quilt_python bindings + .py.quilt runtime)
            run: |
              bin/build-py
              bin/test-py
    # Run every `run:` step inside the devShell: GitHub writes the step's script
    # to a temp file and substitutes it for `{0}`, so multi-line steps work too.
    defaults:
      run:
        shell: nix develop ./nix --command bash -euo pipefail {0}
    steps:
      - uses: actions/checkout@v4
      # Install Nix with flakes + the `nix-command` enabled (needed for
      # `nix develop`).
      - uses: DeterminateSystems/nix-installer-action@v22
      # Free, zero-config binary cache backed by the GitHub Actions cache —
      # caches the devShell's /nix/store closure between runs. No secret needed.
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      # rustup downloads the toolchain (rust-toolchain.toml → 1.96.0) on first
      # use into ~/.rustup, and crates/build artifacts land in ~/.cargo and
      # target/ — none of which live in the Nix store, so cache them directly.
      # (Swatinem/rust-cache runs on the host PATH where the Nix-provided rustc
      # isn't visible, so it can't be used here; actions/cache works fine.)
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: ${{ matrix.run }}

  # ---------------------------------------------------------------------------
  # Publish jobs (issue #33). These run ONLY when a `v*` tag is pushed to
  # QuiltLang/quilt, and only after the full check matrix passes on that tag.
  # ---------------------------------------------------------------------------

  # crates.io: publish in dependency order. Uses a classic API token
  # (`CARGO_REGISTRY_TOKEN` repo secret) because crates.io Trusted Publishing
  # can only be configured on a crate that already exists — switch to OIDC via
  # rust-lang/crates-io-auth-action after the first publish.
  #
  # `tree-sitter-quilt` and `quiltlang` publish here. `quiltlang` vendors the
  # tree-sitter-* grammars (build.rs + quilt/grammars/, regenerated by
  # bin/sync-grammars) instead of pulling the forks as git deps, so crates.io
  # accepts it. `quilt-lsp` still depends on those forks as *git* dependencies
  # (crates.io rejects them), so its publish line stays commented until it, too,
  # is git-dep-free — e.g. by taking its grammars from the published `quiltlang`
  # (see #32).
  publish-crates:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'QuiltLang/quilt'
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: nix develop ./nix --command bash -euo pipefail {0}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: cargo publish (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # `cargo publish` waits for the crate to be live in the index before
        # returning, so each line can depend on the previous one.
        #
        # Idempotent across re-tags: if a version was already published by an
        # earlier tag run (e.g. a re-tag to fix the wheel/binary matrix),
        # crates.io rejects the re-upload — treat that one case as success but
        # still fail on any other error.
        run: |
          publish() {
            local pkg="$1" out
            if out=$(cargo publish -p "$pkg" 2>&1); then
              echo "$out"
            else
              echo "$out"
              echo "$out" | grep -qiE "already (uploaded|exists)" \
                && echo "::notice::$pkg already on crates.io for this version — skipping" \
                || { echo "::error::cargo publish ($pkg) failed"; exit 1; }
            fi
          }
          # Dependency order: quiltlang depends on tree-sitter-quilt. cargo publish
          # waits for each to be live in the index before returning.
          publish tree-sitter-quilt
          publish quiltlang
          # quilt-lsp still pulls the grammar forks as git deps (see header / #32):
          # publish quilt-lsp

  # PyPI: build the `quilt-python` distribution (abi3 wheels, one per platform,
  # each working for any CPython >= 3.8, plus an sdist) with maturin. The
  # Python import name stays `quilt` (pyproject.toml module-name).
  #
  # No x86_64-apple-darwin (Intel mac) wheel: it needs a `macos-13` runner, and
  # GitHub's Intel macOS runners are being retired and now queue indefinitely
  # (jobs sat ~10h unscheduled during the v0.1.0-alpha release). Apple-silicon
  # macOS + x86_64/aarch64 Linux cover the alpha; Intel-mac users install from
  # the sdist (builds locally). Revisit by cross-compiling x86_64 on the arm64
  # macOS runner once it can be validated.
  pypi-wheels:
    name: PyPI wheel (${{ matrix.platform.target }} ${{ matrix.platform.runner }})
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'QuiltLang/quilt'
    needs: check
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64 }
          # Free arm64 Linux runners require the repo to be public.
          - { runner: ubuntu-24.04-arm, target: aarch64 }
          - { runner: macos-latest, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      # quilt_python depends on quilt with default-features = false (no
      # tree-sitter, no git grammar deps), so this is a plain Rust build —
      # maturin-action provides its own Rust toolchain + manylinux containers
      # and doesn't need the Nix devShell.
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: auto
          args: --release --out dist --manifest-path quilt-python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-wheel-${{ matrix.platform.target }}-${{ matrix.platform.runner }}
          path: dist

  pypi-sdist:
    name: PyPI sdist
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'QuiltLang/quilt'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # maturin bundles the local path-dependency crates (quiltlang) into the
      # sdist, so it builds standalone.
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path quilt-python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-sdist
          path: dist

  # Upload via PyPI Trusted Publishing (OIDC): the publisher on PyPI must point
  # at QuiltLang/quilt + workflow `ci.yml` and the project name `quilt-python`
  # (the distribution name in quilt-python/pyproject.toml). No API token /
  # secret is needed; `id-token: write` is what authenticates us.
  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'QuiltLang/quilt'
    needs: [pypi-wheels, pypi-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pypi-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  # VS Code extension (tools/quilt): package with vsce and publish to the VS
  # Code Marketplace + Open VSX. Unlike the crates.io/PyPI jobs this uses PAT
  # secrets (VSCE_PAT for the `quiltlang` Marketplace publisher, OVSX_PAT for
  # Open VSX), not OIDC, so it isn't pinned to this workflow file. The extension
  # is plain JS (no compile step); vsce bundles the one prod dep
  # (vscode-languageclient) because .vscodeignore keeps node_modules.
  #
  # Version guard: both registries reject re-publishing an existing version, so
  # each publish tolerates the "already exists" case (treats it as a no-op) and
  # fails only on a real error. A core-only release or a re-tag therefore won't
  # fail here — bump tools/quilt/package.json's `version` to cut an extension
  # release. (Skipped automatically on forks / non-QuiltLang repos.)
  publish-vscode:
    name: Publish VS Code extension
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'QuiltLang/quilt'
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/quilt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      # Plain-JS extension → no compile step; just package into a .vsix.
      - name: Package (.vsix)
        run: npx --yes @vscode/vsce package --out quilt.vsix
      - name: Publish to the VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::notice::VSCE_PAT secret not set — skipping Marketplace publish (the .vsix still built above)"
            exit 0
          fi
          if out=$(npx --yes @vscode/vsce publish --packagePath quilt.vsix -p "$VSCE_PAT" 2>&1); then
            echo "$out"
          else
            echo "$out"
            echo "$out" | grep -qiE "already exists|already published|same version" \
              && echo "::notice::this version already on the Marketplace — skipping" \
              || { echo "::error::vsce publish failed"; exit 1; }
          fi
      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::notice::OVSX_PAT secret not set — skipping Open VSX publish"
            exit 0
          fi
          # Idempotent: no-op if the namespace is already owned.
          npx --yes ovsx create-namespace quiltlang -p "$OVSX_PAT" 2>/dev/null || true
          if out=$(npx --yes ovsx publish quilt.vsix -p "$OVSX_PAT" 2>&1); then
            echo "$out"
          else
            echo "$out"
            echo "$out" | grep -qiE "already exists|already published" \
              && echo "::notice::this version already on Open VSX — skipping" \
              || { echo "::error::ovsx publish failed"; exit 1; }
          fi

  # npm: build the `quilt-wasm` runtime with wasm-pack and publish it via npm
  # Trusted Publishing (OIDC) — the JS/WASM analog of the PyPI `quilt-python`
  # wheel and, like publish-pypi, token-free: GitHub's id-token authenticates
  # the publish and npm records build provenance automatically, so there is no
  # NPM_TOKEN secret to manage. The npm package keeps the crate name
  # (`quilt-wasm`) — the bare specifier expanded `.ts.quilt` code imports — and
  # is built `--target web` (a default-export `init()` plus the named builder
  # functions, native browser ESM) because that is exactly what every consumer
  # expects: the browser demos (examples/web) and the TypeScript that
  # `quilt expand` emits.
  #
  # ⚠️ One-time setup: trusted publishing is configured on the package at
  # npmjs.com, which requires the package to already exist (npm has no
  # PyPI-style "pending publisher"). So the FIRST release must be published
  # another way — `wasm-pack build quilt-wasm --target web && npm publish` from
  # quilt-wasm/pkg with `npm login`, or a one-off token. After that, add the
  # trusted publisher (GitHub Actions → repo QuiltLang/quilt, workflow ci.yml)
  # and this job handles every release with no secret. An already-published
  # version is treated as a no-op, so a re-tag or a core-only release won't fail.
  #
  # Unlike publish-crates (Nix devShell) but like pypi-*/publish-vscode, this
  # runs outside Nix — wasm-pack + node are simpler to provision with their own
  # actions than to add to the flake. The runner's preinstalled rustup
  # auto-installs the pinned toolchain (rust-toolchain.toml) on first cargo use,
  # and wasm-pack adds the wasm32-unknown-unknown target itself.
  publish-npm:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'QuiltLang/quilt'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      # OIDC: npm exchanges this short-lived token for registry credentials and
      # mints the provenance attestation. This is what authenticates us — there
      # is no NPM_TOKEN secret.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing needs npm >= 11.5.1; the Node 24 image ships an older
      # 11.x, so pin to the latest before publishing.
      - name: Update npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'
      # `--target web`: a default-export `init()` + the named runtime functions,
      # the API expanded `.ts.quilt` modules import. Lands in quilt-wasm/pkg/
      # with a generated package.json (name/version/license/description/
      # repository/keywords all from quilt-wasm/Cargo.toml).
      - name: wasm-pack build
        run: wasm-pack build quilt-wasm --target web
      # No token / NODE_AUTH_TOKEN: with a trusted publisher configured, npm
      # detects the GitHub OIDC environment and authenticates automatically
      # (provenance included). Until that one-time setup is done (see header),
      # this step fails with an auth error by design.
      - name: npm publish (OIDC trusted publishing)
        working-directory: quilt-wasm/pkg
        run: |
          if out=$(npm publish --access public 2>&1); then
            echo "$out"
          else
            echo "$out"
            echo "$out" | grep -qiE "cannot publish over|previously published|already exists|EPUBLISHCONFLICT" \
              && echo "::notice::this version already on npm — skipping" \
              || { echo "::error::npm publish failed"; exit 1; }
          fi
