name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR cancels in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Every check runs a single bin/ script inside the flake devShell
  # (`nix develop ./nix`), so the exact same command reproduces locally and the
  # flake is the single source of truth for tooling — rustup (→ rust 1.96.0 with
  # clippy + rustfmt from rust-toolchain.toml), rust-script, python3,
  # tree-sitter, nodejs. No per-job setup-rust-toolchain / setup-python /
  # `cargo install rust-script` steps to drift out of sync with the dev env.
  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      # Let the other checks finish even if one fails.
      fail-fast: false
      matrix:
        include:
          - name: Test
            run: bin/ctest
          - name: Lint (fmt + clippy)
            # Formatting needs no build, so check it first for fast feedback.
            run: |
              bin/fmt-check
              bin/lint -- -D warnings
          - name: Bootstrap (self-host no-op)
            run: bin/check-bootstrap
    # Run every `run:` step inside the devShell: GitHub writes the step's script
    # to a temp file and substitutes it for `{0}`, so multi-line steps work too.
    defaults:
      run:
        shell: nix develop ./nix --command bash -euo pipefail {0}
    steps:
      - uses: actions/checkout@v4
      # Install Nix with flakes + the `nix-command` enabled (needed for
      # `nix develop`).
      - uses: DeterminateSystems/nix-installer-action@v22
      # Free, zero-config binary cache backed by the GitHub Actions cache —
      # caches the devShell's /nix/store closure between runs. No secret needed.
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      # rustup downloads the toolchain (rust-toolchain.toml → 1.96.0) on first
      # use into ~/.rustup, and crates/build artifacts land in ~/.cargo and
      # target/ — none of which live in the Nix store, so cache them directly.
      # (Swatinem/rust-cache runs on the host PATH where the Nix-provided rustc
      # isn't visible, so it can't be used here; actions/cache works fine.)
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: ${{ matrix.run }}
